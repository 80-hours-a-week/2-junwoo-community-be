services:
  db:
    image: mysql:8.0
    container_name: community_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "020725"
      MYSQL_DATABASE: community_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    # TODO: Replace with your actual Docker Hub username, e.g., your-username/junwoo-backend
    image: 958933161468.dkr.ecr.ap-northeast-2.amazonaws.com/junwoo-backend:latest
    container_name: community_be
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:020725@db:3306/community_db
    depends_on:
      - db

volumes:
  db_data:
